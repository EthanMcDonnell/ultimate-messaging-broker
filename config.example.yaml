# ─── Messaging Platform Configuration ────────────────────────────────────────
# Copy this file to config.yaml and fill in your details.

# Which platform to run: "imessage" or "telegram" (required)
platform: imessage

# ─── iMessage ─────────────────────────────────────────────────────────────────
imessage:
  # Your phone number as it appears in iMessage (E.164 format or however macOS stores it).
  # Run: sqlite3 ~/Library/Messages/chat.db "SELECT DISTINCT chat_identifier FROM chat;"
  allowed_sender: "+1XXXXXXXXXX"

  # The chat_identifier for the self-chat to monitor (usually same as above).
  self_chat_id: "+1XXXXXXXXXX"

  # Polling interval in seconds (2-5 recommended)
  poll_interval: 3

  # Max characters per iMessage chunk (long responses are split automatically)
  max_chunk_size: 4000

# ─── Telegram ─────────────────────────────────────────────────────────────────
telegram:
  # Get a bot token from @BotFather on Telegram
  bot_token: "YOUR_BOT_TOKEN"
  # Your Telegram user ID — send a message to @userinfobot to find it
  allowed_user_id: 123456789
  # Supergroup chat ID for topic-based routing (negative number).
  # Required if you use "topic" when posting via the HTTP API.
  # To find: open the group in Telegram Web — the URL is /c/<group_id>/<topic_id>/<msg_id>
  # Prefix the group_id with -100 for the Bot API, e.g. /c/1234567890 → -1001234567890
  # telegram_group_id: -1001234567890
  #
  # Telegram topics drive interactive `claude` via tmux — this keeps using the
  # regular plan rather than the separate Agent-SDK credit pool that takes over
  # on 2026-06-15. Requires `tmux` on PATH. Inspect live sessions with
  # `tmux ls | grep claudebroker-`. Stale sessions are reaped on /new and the
  # 24h TTL.

# ─── API Server (Telegram platform only) ──────────────────────────────────────
# HTTP server that lets other projects post jobs to Telegram and receive responses.
# Runs automatically when platform is "telegram".
api_server:
  host: "127.0.0.1"
  port: 8765

# ─── Shared ───────────────────────────────────────────────────────────────────

# Claude CLI settings
claude:
  timeout: 120        # seconds before killing a claude invocation
  max_response_length: 16000  # truncate claude output beyond this (chars)

# Rate limit — if exceeded the process exits (rather than throttle)
rate_limits:
  messages_per_minute: 10

# Projects — directories Claude can operate in.
# aliases: voice-friendly names for Siri dictation (fuzzy matched) or Telegram /dir shortcuts
# allowed_tools: passed directly to claude --allowedTools
#   Common values: Read, Glob, Grep, LS, Edit, Write, MultiEdit, Bash
#   MCP tools can also be included: mcp__servername__toolname
projects:
  - name: my-project
    path: /Users/you/Documents/my-project
    # platforms: which transports can use this project.
    # Options: imessage, telegram. Omit to allow both (default).
    platforms: [imessage, telegram]
    # telegram_topic_id: the thread ID from the Telegram Web URL.
    # URL format: /c/<group_id>/<topic_id>/<msg_id> — use the middle number.
    # e.g. /c/1234567890/3/4 → telegram_topic_id: 3
    # Once set, messages in that topic route here automatically,
    # and POST /send with "topic": "my-project" will post into it.
    # telegram_topic_id: 3
    allowed_tools:
      - Read
      - Glob
      - Grep
      - LS

  # Example: telegram-only project mapped to a topic
  # - name: articles
  #   path: /Users/you/Documents/articles
  #   platforms: [telegram]
  #   telegram_topic_id: 5
  #   allowed_tools:
  #     - Read
  #     - Edit
  #     - Write

  # Example: imessage-only project
  # - name: personal
  #   path: /Users/you/Documents/personal
  #   platforms: [imessage]
  #   allowed_tools:
  #     - Read
  #     - Glob
  #     - Grep
  #     - LS


# Default project on startup (must match a project name above)
default_project: my-project
